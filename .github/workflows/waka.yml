name: WakaTime Summary

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write the WakaTime placeholder card
        run: |
          cat > svg/waka.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
            <rect width="1200" height="280" rx="32" fill="#09101A"/>
            <rect x="24" y="24" width="1152" height="232" rx="24" fill="url(#w)" fill-opacity="0.12" stroke="#1F2937"/>
            <text x="56" y="98" fill="#E2E8F0" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">WakaTime Summary</text>
            <text x="56" y="150" fill="#7DD3FC" font-size="26" font-family="Inter, Arial, sans-serif">Connect the WakaTime API key to replace this placeholder card.</text>
            <text x="56" y="190" fill="#94A3B8" font-size="20" font-family="Inter, Arial, sans-serif">Stored token: WAKATIME_API_KEY</text>
            <defs>
              <linearGradient id="w" x1="0" y1="0" x2="1200" y2="280">
                <stop offset="0%" stop-color="#0EA5E9"/>
                <stop offset="55%" stop-color="#8B5CF6"/>
                <stop offset="100%" stop-color="#22D3EE"/>
              </linearGradient>
            </defs>
          </svg>
          EOF

      - name: Commit generated asset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh wakatime card"

      # Add WAKATIME_API_KEY and a GitHub token secret before switching this file to a live
      # WakaTime action. The placeholder keeps the README rendering before setup is complete.