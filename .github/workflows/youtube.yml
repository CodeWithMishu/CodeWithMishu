name: YouTube Card

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate YouTube card
        run: |
          API_KEY="${{ secrets.YOUTUBE_API_KEY }}"
          CHANNEL_ID="${{ secrets.YOUTUBE_CHANNEL_ID }}"

          if [ -z "$API_KEY" ] || [ -z "$CHANNEL_ID" ]; then
            echo "YOUTUBE_API_KEY or YOUTUBE_CHANNEL_ID not set, keeping placeholder card"
            cat > svg/youtube.svg <<'SVGEOF'
            <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none">
              <rect width="1200" height="320" rx="32" fill="#0B1120"/>
              <rect x="24" y="24" width="1152" height="272" rx="24" fill="url(#g)" fill-opacity="0.14" stroke="#1E293B"/>
              <text x="60" y="110" fill="#E2E8F0" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">YouTube</text>
              <text x="60" y="168" fill="#7DD3FC" font-size="28" font-family="Inter, Arial, sans-serif">Replace this card with live channel data when your API key is ready.</text>
              <text x="60" y="220" fill="#94A3B8" font-size="22" font-family="Inter, Arial, sans-serif">Set YOUTUBE_API_KEY and YOUTUBE_CHANNEL_ID as repository secrets.</text>
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#38BDF8"/>
                  <stop offset="50%" stop-color="#8B5CF6"/>
                  <stop offset="100%" stop-color="#06B6D4"/>
                </linearGradient>
              </defs>
            </svg>
            SVGEOF
            exit 0
          fi

          echo "Fetching latest videos from channel $CHANNEL_ID"
          RESPONSE=$(curl -sL --max-time 20 \
            "https://www.googleapis.com/youtube/v3/search?key=$API_KEY&channelId=$CHANNEL_ID&part=snippet,id&order=date&maxResults=3&type=video")

          if [ -z "$RESPONSE" ] || echo "$RESPONSE" | grep -q '"error"'; then
            echo "YouTube API call failed, keeping placeholder"
            exit 0
          fi

          VIDEOS=$(echo "$RESPONSE" | grep -oP '"title":\s*"\K[^"]+' | head -3)
          VID1=$(echo "$VIDEOS" | sed -n '1p')
          VID2=$(echo "$VIDEOS" | sed -n '2p')
          VID3=$(echo "$VIDEOS" | sed -n '3p')

          if [ -z "$VID1" ]; then VID1="Latest Video"; fi
          if [ -z "$VID2" ]; then VID2=""; fi
          if [ -z "$VID3" ]; then VID3=""; fi

          echo "Latest video: $VID1"

          EXTRA_LINES=""
          if [ -n "$VID2" ]; then
            EXTRA_LINES="$EXTRA_LINES<text x=\"60\" y=\"200\" fill=\"#94A3B8\" font-size=\"20\" font-family=\"Inter, Arial, sans-serif\">2. ${VID2:0:65}</text>"
          fi
          if [ -n "$VID3" ]; then
            EXTRA_LINES="$EXTRA_LINES<text x=\"60\" y=\"240\" fill=\"#94A3B8\" font-size=\"20\" font-family=\"Inter, Arial, sans-serif\">3. ${VID3:0:65}</text>"
          fi

          cat > svg/youtube.svg <<SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none">
            <rect width="1200" height="320" rx="32" fill="#0B1120"/>
            <rect x="24" y="24" width="1152" height="272" rx="24" fill="url(#ytgrad)" fill-opacity="0.12" stroke="#1E293B"/>
            <text x="60" y="90" fill="#E2E8F0" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">Latest Videos</text>
            <text x="60" y="140" fill="#7DD3FC" font-size="22" font-family="Inter, Arial, sans-serif">1. ${VID1:0:70}</text>
            ${EXTRA_LINES}
            <text x="60" y="280" fill="#475569" font-size="16" font-family="Inter, Arial, sans-serif">Auto-generated from YouTube Data API</text>
            <defs>
              <linearGradient id="ytgrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#FF0000"/>
                <stop offset="50%" stop-color="#8B5CF6"/>
                <stop offset="100%" stop-color="#06B6D4"/>
              </linearGradient>
            </defs>
          </svg>
          SVGEOF

      - name: Commit generated asset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh youtube card"
